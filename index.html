<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ilya Runner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main id="appRoot" class="app">
      <header class="header">
        <h1>Ilya Runner</h1>
        <div class="hud">
          <span>Score: <b id="score">0</b></span>
          <span>Best: <b id="best">0</b></span>
          <span>Faces: <b id="faces">0</b></span>
        </div>
      </header>
      <div class="game-wrap">
        <canvas id="game" width="1280" height="720" aria-label="Ilya runner game area"></canvas>
        <div id="mainMenu" class="main-menu">
          <div class="main-menu-card">
            <h2>Главное меню</h2>
            <div id="menuMainPanel" class="menu-panel">
              <div class="main-menu-actions">
                <button id="menuPlay" type="button">Играть</button>
                <button id="menuSettings" type="button">Настройки</button>
                <button id="menuShop" type="button">Магазин</button>
              </div>
            </div>

            <div id="menuSettingsPanel" class="menu-panel menu-settings-panel hidden">
              <p class="menu-settings-title">Настройки: Звук</p>
              <div class="main-menu-actions">
                <button id="menuSoundOff" type="button">Выключить звук</button>
                <button id="menuSoundOn" type="button">Включить звук</button>
              </div>
              <p class="menu-settings-title">Настройки: Снег</p>
              <div class="main-menu-actions">
                <button id="menuSnowOff" type="button">Отключить снег</button>
                <button id="menuSnowOn" type="button">Включить снег</button>
              </div>
              <p class="menu-settings-title">Настройки: Режим видео</p>
              <div class="main-menu-actions">
                <button id="menuVideoWindow" type="button">Оконный режим</button>
                <button id="menuVideoFull" type="button">Полный режим</button>
              </div>
              <div class="main-menu-actions menu-actions-spaced">
                <button id="menuSettingsBack" type="button">Назад</button>
              </div>
            </div>

            <div id="menuShopPanel" class="menu-panel menu-settings-panel hidden">
              <p class="menu-settings-title">Магазин</p>
              <div class="main-menu-actions">
                <button id="shopSkin" type="button">Скин: Илья Pro</button>
                <button id="shopTrail" type="button">Эффект: Огонь</button>
                <button id="shopPack" type="button">Пак: Meme SFX</button>
              </div>
              <div class="main-menu-actions menu-actions-spaced">
                <button id="menuShopBack" type="button">Назад</button>
              </div>
            </div>
            <p id="menuHint" class="main-menu-hint">Выбери пункт меню. Кнопка M открывает меню в игре.</p>
          </div>
        </div>
      </div>
      <div class="controls">
        <p id="status">Space/Right Mouse jump x2, F boost jump, Shift/E nitro, S stop, R restart.</p>
        <div class="action-buttons">
          <button id="boost" type="button">Boost Jump (F)</button>
          <button id="nitro" type="button">Nitro (Shift)</button>
          <button id="stop" type="button">Stop (S)</button>
          <button id="restart" type="button">Restart</button>
        </div>
      </div>
    </main>
    <script src="./game.js"></script>
  </body>
</html>
